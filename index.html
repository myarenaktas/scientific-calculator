<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Scientific Calculator</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
.calculator{width:84%;margin:30px auto;background:#000;color:white}
.title{padding:20px;font-size:22px}
.display{height:220px;display:flex;align-items:flex-end;justify-content:flex-end;
font-size:50px;padding:25px;border-bottom:1px solid #777}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:5px}
button{height:50px;border:0;border-radius:7px;font-size:18px;font-weight:bold;color:white;cursor:pointer}
.num{background:#2f2f2f}
.func{background:#6f8994}
.op{background:#ff9418}
.clear,.del{background:#ff4d57}
.equal{background:#4caf50}
.wide{grid-column:span 2}
</style>
</head>
<body>

<div class="calculator">
  <div class="title">Scientific Calculator</div>
  <div id="display" class="display">0</div>

  <div class="buttons">
    <button class="func" onclick="add('sin(')">sin(</button>
    <button class="func" onclick="add('cos(')">cos(</button>
    <button class="func" onclick="add('tan(')">tan(</button>
    <button class="func" onclick="add('log(')">log(</button>

    <button class="func" onclick="add('sqrt(')">sqrt(</button>
    <button class="func" onclick="add('^')">^</button>
    <button class="func" onclick="add('(')">(</button>
    <button class="func" onclick="add(')')">)</button>

    <button class="num" onclick="add('7')">7</button>
    <button class="num" onclick="add('8')">8</button>
    <button class="num" onclick="add('9')">9</button>
    <button class="op" onclick="add('/')">÷</button>

    <button class="num" onclick="add('4')">4</button>
    <button class="num" onclick="add('5')">5</button>
    <button class="num" onclick="add('6')">6</button>
    <button class="op" onclick="add('*')">×</button>

    <button class="num" onclick="add('1')">1</button>
    <button class="num" onclick="add('2')">2</button>
    <button class="num" onclick="add('3')">3</button>
    <button class="op" onclick="add('-')">-</button>

    <button class="num" onclick="add('0')">0</button>
    <button class="num" onclick="add('.')">.</button>
    <button class="del" onclick="del()">⌫</button>
    <button class="op" onclick="add('+')">+</button>

    <button class="clear wide" onclick="clearDisplay()">C</button>
    <button class="equal wide" onclick="calculate()">=</button>
  </div>
</div>

<script>
let display = document.getElementById("display");
let expression = "";

function add(value){
  expression += value;
  display.innerText = expression;
}

function clearDisplay(){
  expression = "";
  display.innerText = "0";
}

function del(){
  expression = expression.slice(0, -1);
  display.innerText = expression || "0";
}

function calculate(){
  try{
    let exp = expression
      .replaceAll("^", "**")
      .replaceAll("sin(", "Math.sin(")
      .replaceAll("cos(", "Math.cos(")
      .replaceAll("tan(", "Math.tan(")
      .replaceAll("log(", "Math.log10(")
      .replaceAll("sqrt(", "Math.sqrt(");

    let result = eval(exp);
    display.innerText = result;
    expression = result.toString();
  }catch{
    display.innerText = "Error";
    expression = "";
  }
}
</script>

</body>
</html>
